<!DOCTYPE html>
<html lang="pt-BR" class="transition-colors duration-500">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altaris - Painel dos Pais</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans min-h-screen">

    <header class="bg-emerald-900 text-white px-4 py-4 shadow-md sticky top-0 z-40">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center"><i class="fa-solid fa-people-roof text-emerald-300"></i></div>
                <div>
                    <h2 id="nome-pai" class="text-sm font-black uppercase">Responsável</h2>
                </div>
            </div>
            <button id="btn-logout" class="bg-emerald-950/40 px-4 py-2 rounded-xl text-xs font-bold">Sair</button>
        </div>
    </header>

    <main class="max-w-6xl w-full mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6 mt-6">
        <div class="md:col-span-2 space-y-6">
            <div class="bg-white rounded-3xl p-6 border shadow-sm">
                <h3 class="text-sm font-black text-slate-800 mb-4">Escalas dos Meus Dependentes</h3>
                <div id="lista-escalas-filhos" class="space-y-4"><p class="text-xs text-slate-400">Carregando escalas...</p></div>
            </div>
        </div>
        <div class="bg-white rounded-3xl p-5 border shadow-sm h-fit">
            <h3 class="text-sm font-black text-slate-800 mb-4"><i class="fa-solid fa-bell text-emerald-600"></i> Mural</h3>
            <div id="mural-avisos" class="text-xs text-slate-600">Carregando avisos...</div>
        </div>
    </main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCwPeLrAtNEO41MZ3yxSuYib2LC0z2dv9U",
        authDomain: "tarcisius-d03d7.firebaseapp.com",
        projectId: "tarcisius-d03d7",
        storageBucket: "tarcisius-d03d7.firebasestorage.app",
        messagingSenderId: "186797936591",
        appId: "1:186797936591:web:72c81c54fb7c1905c1ccba"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // --- BLOCO DE INJEÇÃO DE SESSÃO FAKE PARA DESENVOLVIMENTO ---
    const devSession = sessionStorage.getItem("dev_user");
    let usuarioLogadoDados = null;

    if (devSession) {
        try {
            usuarioLogadoDados = JSON.parse(devSession);
            console.warn("⚠️ Modo Desenvolvimento: Logado com usuário fake:", usuarioLogadoDados);
            // Executa a inicialização do painel usando o e-mail mockado
            inicializarPainel(usuarioLogadoDados.email);
        } catch (e) {
            console.error("Erro ao ler dev_user do sessionStorage", e);
        }
    }
    // -------------------------------------------------------------

    // Só ativa o monitoramento do Firebase se NÃO houver uma sessão fake ativa
    if (!usuarioLogadoDados) {
        onAuthStateChanged(auth, async (user) => {
            if (!user) { 
                window.location.href = "index.html"; 
                return; 
            }
            inicializarPainel(user.email);
        });
    }

    // Função centralizada que carrega os dados do painel
    async function inicializarPainel(emailUsuario) {
        // 1. Atualiza o mural em tempo real
        onSnapshot(collection(db, "mural"), (snap) => {
            document.getElementById('mural-avisos').innerHTML = snap.docs.map(d => `<p class="mb-2 border-b pb-1">${d.data().texto}</p>`).join('');
        });

        // 2. Busca os dependentes/filhos baseados no e-mail do usuário logado (real ou fake)
        const qUsuarios = query(collection(db, "usuarios"), where("email_conexao", "==", emailUsuario));
        const snapUsuarios = await getDocs(qUsuarios);
        const listaEscalas = document.getElementById('lista-escalas-filhos');

        if (snapUsuarios.empty) {
            listaEscalas.innerHTML = `<p class="text-xs text-slate-400">Nenhum acólito vinculado encontrado.</p>`;
            return;
        }

        const filhos = snapUsuarios.docs.map(d => d.data().nome);
        const snapEscalas = await getDocs(collection(db, "escalas"));
        let htmlFilhos = "";

        filhos.forEach(nomeFilho => {
            let escalasFilho = [];
            
            snapEscalas.forEach(doc => {
                const data = doc.data();
                Object.keys(data).forEach(key => {
                    if (data[key] && data[key].nome === nomeFilho) {
                        escalasFilho.push({ 
                            ...data, 
                            dataEscala: data.data || "Data não definida",
                            horario: data.horario || "--:--" 
                        });
                    }
                });
            });

            htmlFilhos += `
                <div class="border-b pb-4">
                    <h4 class="font-bold text-emerald-800 mb-2">${nomeFilho}</h4>
                    ${escalasFilho.length > 0 ? escalasFilho.map(e => `
                        <div class="flex justify-between bg-slate-50 p-3 rounded-lg text-[11px] mb-2 items-center">
                            <div>
                                <span class="font-bold text-slate-700">${e.dataEscala}</span>
                                <span class="ml-2 text-emerald-700 font-black">${e.horario}</span>
                            </div>
                            <span class="font-bold uppercase text-slate-500">${e.evento || 'Santa Missa'}</span>
                        </div>
                    `).join('') : '<p class="text-[10px] text-slate-400">Sem escalas registradas.</p>'}
                </div>
            `;
        });

        listaEscalas.innerHTML = htmlFilhos;
    }

    // Configuração do botão de logout (limpa a sessão de dev também)
    document.getElementById('btn-logout').onclick = () => {
        if (devSession) {
            sessionStorage.removeItem("dev_user");
            window.location.href = "index.html";
        } else {
            signOut(auth);
        }
    };
</script>
</body>
</html>
