<!DOCTYPE html>
<html lang="pt-BR" class="transition-colors duration-500">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altaris - Painel dos Pais</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style type="text/tailwindcss">
        .active-tab { border-bottom: 3px solid #059669; color: #059669; font-weight: 800; }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen">

    <header class="bg-emerald-900 text-white px-4 py-4 shadow-md sticky top-0 z-40">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center"><i class="fa-solid fa-people-roof text-emerald-300"></i></div>
                <div>
                    <h2 id="nome-pai" class="text-sm font-black uppercase">Responsável</h2>
                    <span class="text-[9px] bg-white/20 px-2 py-0.5 rounded font-bold uppercase">Painel de Acompanhamento</span>
                </div>
            </div>
            <button id="btn-logout" class="bg-emerald-950/40 px-4 py-2 rounded-xl text-xs font-bold">Sair</button>
        </div>
    </header>

    <main class="max-w-6xl w-full mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6 mt-6">
        <div class="md:col-span-2 space-y-6">
            <div class="bg-white rounded-3xl p-6 border shadow-sm">
                <h3 class="text-sm font-black text-slate-800 mb-4">Meus Dependentes (Acolitos)</h3>
                <div id="lista-filhos" class="space-y-3"><p class="text-xs text-slate-400">Carregando...</p></div>
            </div>
        </div>
        <div class="bg-white rounded-3xl p-5 border shadow-sm h-fit">
            <h3 class="text-sm font-black text-slate-800 mb-4"><i class="fa-solid fa-bell text-emerald-600"></i> Mural</h3>
            <div id="mural-avisos" class="text-xs text-slate-600">Carregando avisos...</div>
        </div>
    </main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCwPeLrAtNEO41MZ3yxSuYib2LC0z2dv9U",
        authDomain: "tarcisius-d03d7.firebaseapp.com",
        projectId: "tarcisius-d03d7",
        storageBucket: "tarcisius-d03d7.firebasestorage.app",
        messagingSenderId: "186797936591",
        appId: "1:186797936591:web:72c81c54fb7c1905c1ccba"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "login.html"; return; }
        
        // 1. Carregar Mural
        onSnapshot(collection(db, "mural"), (snap) => {
            const muralDiv = document.getElementById('mural-avisos');
            muralDiv.innerHTML = snap.docs.map(d => `<p class="mb-2">${d.data().texto}</p>`).join('');
        });

        // 2. Carregar Filhos (Busca usuários onde email_conexao seja o email do pai logado)
        const q = query(collection(db, "usuarios"), where("email_conexao", "==", user.email));
        const querySnapshot = await getDocs(q);
        const listaFilhos = document.getElementById('lista-filhos');
        
        if (querySnapshot.empty) {
            listaFilhos.innerHTML = `<p class="text-xs text-slate-400">Nenhum dependente vinculado a este e-mail.</p>`;
        } else {
            listaFilhos.innerHTML = querySnapshot.docs.map(doc => `
                <div class="p-4 bg-slate-50 rounded-xl border flex justify-between items-center">
                    <span class="text-xs font-bold text-slate-700">${doc.data().nome}</span>
                    <span class="text-[10px] bg-emerald-100 text-emerald-800 px-2 py-1 rounded-full font-bold uppercase">Coroinha</span>
                </div>
            `).join('');
        }
    });

    document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => window.location.href = "index.html");
</script>
</body>
</html>
