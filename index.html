<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altaris - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans min-h-screen flex items-center justify-center p-4">

    <!-- Tela de Carregamento Refinada -->
    <div id="tela-loading" class="fixed inset-0 bg-white/90 backdrop-blur-sm z-50 flex flex-col items-center justify-center transition-opacity duration-300 pointer-events-none opacity-0">
        <div class="animate-spin rounded-full h-10 w-10 border-t-4 border-b-4 border-red-700 mb-4"></div>
        <p class="text-xs font-bold text-gray-500 tracking-wider uppercase">Validando Credenciais...</p>
    </div>

    <!-- Card de Login -->
    <div class="bg-white p-8 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <!-- Ícone nas Cores dos Coroinhas -->
            <div class="w-16 h-16 bg-gradient-to-br from-red-700 to-red-600 text-white rounded-2xl flex items-center justify-center text-2xl mx-auto shadow-md shadow-red-700/20 mb-4">
                <i class="fa-solid fa-cross"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-gray-800 tracking-tight">Serviço do Altar</h1>
            <p class="text-xs text-gray-400 font-medium mt-1">Insira suas credenciais para acessar as escalas</p>
        </div>

        <form id="form-login" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">E-mail Cadastrado</label>
                <div class="relative">
                    <i class="fa-solid fa-envelope absolute left-3.5 top-3.5 text-gray-400 text-xs"></i>
                    <input type="email" id="login-email" required placeholder="exemplo@igreja.com" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 pl-10 pr-4 text-sm outline-none transition-all duration-200 focus:border-red-600 focus:bg-white focus:ring-4 focus:ring-red-600/10 font-medium text-gray-700 placeholder-gray-400">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">Senha de Acesso</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-3.5 top-3.5 text-gray-400 text-xs"></i>
                    <input type="password" id="login-senha" required placeholder="••••••••" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 pl-10 pr-4 text-sm outline-none transition-all duration-200 focus:border-red-600 focus:bg-white focus:ring-4 focus:ring-red-600/10 font-medium text-gray-700 placeholder-gray-400">
                </div>
            </div>

            <div id="erro-login" class="hidden text-xs bg-rose-50 border border-rose-100 text-rose-700 p-3 rounded-xl font-semibold flex items-center gap-2 transition-all">
                <i class="fa-solid fa-triangle-exclamation"></i> <span id="erro-login-texto">Usuário ou senha incorretos.</span>
            </div>

            <!-- Botão com Micro-interações Fluidas -->
            <button type="submit" class="w-full bg-gradient-to-r from-red-700 to-red-600 hover:from-red-800 hover:to-red-700 text-white font-bold py-3 rounded-xl shadow-md shadow-red-700/10 transition-all duration-200 ease-in-out hover:scale-[1.01] active:scale-[0.99] cursor-pointer text-sm tracking-wide">
                Entrar no Sistema <i class="fa-solid fa-arrow-right-to-bracket ml-1.5 text-xs"></i>
            </button>
        </form>
        
        <div class="text-center mt-5">
            <a href="primeiro-acesso.html" class="text-xs font-bold text-red-700 hover:text-red-800 transition-colors">
                É seu primeiro acesso? Use o código do coordenador aqui
            </a>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCwPeLrAtNEO41MZ3yxSuYib2LC0z2dv9U",
        authDomain: "tarcisius-d03d7.firebaseapp.com",
        projectId: "tarcisius-d03d7",
        storageBucket: "tarcisius-d03d7.firebasestorage.app",
        messagingSenderId: "186797936591",
        appId: "1:186797936591:web:72c81c54fb7c1905c1ccba"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const telaLoading = document.getElementById('tela-loading');
    const formLogin = document.getElementById('form-login');
    const erroLogin = document.getElementById('erro-login');
    const erroLoginTexto = document.getElementById('erro-login-texto');

    function showLoading() { if(telaLoading) telaLoading.classList.replace('opacity-0', 'opacity-100'); }
    function hideLoading() { if(telaLoading) telaLoading.classList.replace('opacity-100', 'opacity-0'); }

    // Verifica se já está logado e redireciona automaticamente
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            showLoading();
            const docSnap = await getDoc(doc(db, "usuarios", user.uid));
            const emailAtual = user.email ? user.email.toLowerCase() : "";
            
            if (docSnap.exists()) {
                redirecionarPorFuncao(docSnap.data().funcao, emailAtual);
            } else {
                redirecionarPorFuncao("", emailAtual);
            }
        } else {
            const devSession = sessionStorage.getItem("dev_user");
            if (devSession) {
                redirecionarPorFuncao(JSON.parse(devSession).funcao);
            }
        }
    });

    // Roteador Inteligente
    function redirecionarPorFuncao(funcao, email = "") {
        if (funcao === "Coordenador") {
            window.location.href = "coordenador.html";
        } else if (funcao === "Mestre" || email === "padre@altaris.com" || email === "casalcoordenador@altaris.com") {
            window.location.href = "mestre.html";
        } else {
            window.location.href = "coroinha.html";
        }
    }

    if(formLogin) {
        formLogin.addEventListener('submit', async (e) => {
            e.preventDefault();
            showLoading();
            const emailInput = document.getElementById('login-email').value.trim().toLowerCase();
            const senhaInput = document.getElementById('login-senha').value.trim();

            if (emailInput === "dev@altaris.com" && senhaInput === "dev1234") {
                const devUser = { nome: "Desenvolvedor Altaris", funcao: "Coordenador" };
                sessionStorage.setItem("dev_user", JSON.stringify(devUser));
                window.location.href = "coordenador.html";
                return;
            }

            try {
                const cred = await signInWithEmailAndPassword(auth, emailInput, senhaInput);
                const docSnap = await getDoc(doc(db, "usuarios", cred.user.uid));
                
                if (docSnap.exists()) {
                    redirecionarPorFuncao(docSnap.data().funcao, emailInput);
                } else {
                    redirecionarPorFuncao("", emailInput);
                }
            } catch (err) { 
                if(erroLoginTexto) erroLoginTexto.innerText = "E-mail ou senha incorretos.";
                if(erroLogin) erroLogin.classList.remove('hidden'); 
                hideLoading();
            }
        });
    }
</script>
</body>
</html>
