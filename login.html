<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altaris - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div id="tela-loading" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center transition-opacity duration-300 pointer-events-none opacity-0">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-amber-700 mb-4"></div>
        <p class="text-xs font-semibold text-gray-500 tracking-wider uppercase">Verificando sessão...</p>
    </div>

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-amber-700 text-white rounded-2xl flex items-center justify-center text-2xl mx-auto shadow-md mb-3">
                <i class="fa-solid fa-cross"></i>
            </div>
            <h1 class="text-2xl font-black text-gray-800 tracking-tight">Serviço do Altar</h1>
            <p class="text-xs text-gray-500 font-medium">Insira suas credenciais para acessar as escalas</p>
        </div>

        <form id="form-login" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">E-mail Cadastrado</label>
                <div class="relative">
                    <i class="fa-solid fa-envelope absolute left-3 top-3.5 text-gray-400 text-xs"></i>
                    <input type="email" id="login-email" required placeholder="exemplo@igreja.com" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 pl-9 pr-4 text-sm focus:outline-none focus:border-amber-600 transition-all font-medium">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Senha de Acesso</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-3 top-3.5 text-gray-400 text-xs"></i>
                    <input type="password" id="login-senha" required placeholder="••••••••" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 pl-9 pr-4 text-sm focus:outline-none focus:border-amber-600 transition-all font-medium">
                </div>
            </div>

            <div id="erro-login" class="hidden text-xs bg-rose-50 border border-rose-200 text-rose-700 p-3 rounded-lg font-semibold flex items-center gap-2">
                <i class="fa-solid fa-triangle-exclamation"></i> <span id="erro-login-texto">Usuário ou senha incorretos.</span>
            </div>

            <button type="submit" class="w-full bg-amber-700 hover:bg-amber-800 text-white font-bold py-3 rounded-xl shadow-md hover:shadow-lg transition-all cursor-pointer text-sm tracking-wide">
                Entrar no Sistema <i class="fa-solid fa-arrow-right-to-bracket ml-1"></i>
            </button>
        </form>
        <div style="text-align: center; margin-top: 15px;">
            <a href="primeiro-acesso.html" style="color: #2563eb; text-decoration: none; font-size: 14px;">
                É seu primeiro acesso? Use o código do coordenador aqui
            </a>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCwPeLrAtNEO41MZ3yxSuYib2LC0z2dv9U",
        authDomain: "tarcisius-d03d7.firebaseapp.com",
        projectId: "tarcisius-d03d7",
        storageBucket: "tarcisius-d03d7.firebasestorage.app",
        messagingSenderId: "186797936591",
        appId: "1:186797936591:web:72c81c54fb7c1905c1ccba"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const formLogin = document.getElementById('form-login');
    const erroLogin = document.getElementById('erro-login');
    const erroLoginTexto = document.getElementById('erro-login-texto');
    const telaLoading = document.getElementById('tela-loading');

    function showLoading() {
        telaLoading?.classList.remove('opacity-0', 'pointer-events-none');
        telaLoading?.classList.add('opacity-100');
    }

    // Se o usuário já estiver logado, manda direto pro index
    onAuthStateChanged(auth, (user) => {
        if (user || sessionStorage.getItem("dev_user")) {
            window.location.href = "index.html";
        }
    });

    if(formLogin) {
        formLogin.addEventListener('submit', async (e) => {
            e.preventDefault();
            showLoading();
            const emailInput = document.getElementById('login-email').value.trim().toLowerCase();
            const senhaInput = document.getElementById('login-senha').value.trim();

            // Modo de desenvolvimento Bypass
            if (emailInput === "dev@altaris.com" && senhaInput === "dev1234") {
                const devUser = {
                    uid: "dev_bypass_id",
                    nome: "Desenvolvedor Altaris",
                    email: "dev@altaris.com",
                    funcao: "Coordenador"
                };
                sessionStorage.setItem("dev_user", JSON.stringify(devUser));
                window.location.href = "index.html";
                return;
            }

            try {
                await signInWithEmailAndPassword(auth, emailInput, senhaInput);
                // O onAuthStateChanged vai disparar e mandar pro index.html automaticamente
            } catch (err) { 
                console.error("Erro ao logar: ", err.code);
                if(erroLoginTexto) {
                    if(err.code === "auth/invalid-credential" || err.code === "auth/wrong-password" || err.code === "auth/user-not-found") {
                        erroLoginTexto.innerText = "E-mail ou senha incorretos.";
                    } else {
                        erroLoginTexto.innerText = "Erro ao conectar: " + err.message;
                    }
                }
                erroLogin?.classList.remove('hidden'); 
                telaLoading?.classList.add('opacity-0', 'pointer-events-none');
            }
        });
    }
</script>
</body>
</html>
