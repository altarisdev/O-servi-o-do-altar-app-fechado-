<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altaris - Sandbox Dev</title>
    <link rel="stylesheet" href="style.css"> <!-- Opcional: Seu arquivo de estilos -->
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

    <div class="w-full max-w-md p-8 bg-gray-800 rounded-lg shadow-md">
        <h2 class="text-2xl font-bold text-center mb-6 text-yellow-500">Acesso do Desenvolvedor</h2>
        
        <!-- Formulário do Dev com IDs alinhados ao Script -->
        <form id="form-login-dev" class="space-y-4">
            <div>
                <label for="dev-email" class="block text-sm font-medium mb-1">E-mail Dev:</label>
                <input type="email" id="dev-email" required 
                       class="w-full p-2 rounded bg-gray-700 border border-gray-600 text-white focus:outline-none focus:border-yellow-500">
            </div>
            
            <div>
                <label for="dev-senha" class="block text-sm font-medium mb-1">Senha Dev:</label>
                <input type="password" id="dev-senha" required 
                       class="w-full p-2 rounded bg-gray-700 border border-gray-600 text-white focus:outline-none focus:border-yellow-500">
            </div>

            <button type="submit" 
                    class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-2 px-4 rounded transition duration-200">
                Injetar Bypass e Entrar
            </button>
        </form>
        
        <div class="text-center mt-4">
            <a href="index.html" class="text-sm text-gray-400 hover:underline">Voltar para o Login Padrão</a>
        </div>
    </div>

    <!-- Script de validação local do Dev -->
    <script>
        const formLoginDev = document.getElementById('form-login-dev');

        if (formLoginDev) {
            formLoginDev.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const emailInput = document.getElementById('dev-email').value.trim().toLowerCase();
                const senhaInput = document.getElementById('dev-senha').value.trim();

                if (emailInput === "dev@altaris.com" && senhaInput === "dev1234") {
                    console.log("Bypass Dev Autorizado localmente.");
                    
                    const usuarioDev = {
                        uid: "dev_bypass_id",
                        nome: "Desenvolvedor Altaris",
                        email: "dev@altaris.com",
                        funcao: "Coordenador"
                    };
                    
                    // Salva na sessão para o index.html ler
                    sessionStorage.setItem("dev_user", JSON.stringify(usuarioDev));
                    
                    // Redireciona para o painel principal
                    window.location.href = "index.html";
                } else {
                    alert("Credenciais de desenvolvedor incorretas.");
                }
            });
        }
    </script>
</body>
</html>
