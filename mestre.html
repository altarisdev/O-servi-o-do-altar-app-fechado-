<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altaris - Painel do Diretor / Casal Coordenador</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col md:flex-row">

    <div id="tela-loading" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-amber-900 mb-4"></div>
        <p class="text-xs font-semibold text-gray-500 tracking-wider uppercase">Carregando Painel Superior...</p>
    </div>

    <aside class="bg-stone-900 text-white w-full md:w-64 shrink-0 flex flex-col shadow-xl z-40">
        <div class="p-5 border-b border-white/10 flex items-center gap-3">
            <div class="w-9 h-9 bg-amber-600/20 rounded-xl flex items-center justify-center text-amber-500 text-base">
                <i class="fa-solid fa-user-tie"></i>
            </div>
            <div>
                <h2 id="nome-usuario-header" class="text-xs font-black leading-tight truncate max-w-[140px]">Padre / Casal</h2>
                <span class="text-[9px] bg-amber-600 px-1.5 py-0.5 rounded-sm font-bold uppercase tracking-wider block mt-0.5 w-fit">Direção Geral</span>
            </div>
        </div>

        <nav class="p-4 flex-1 flex flex-col gap-1.5 overflow-y-auto">
            <button id="btn-m-missas" onclick="switchMestreTab('m-missas')" class="w-full text-left py-2.5 px-3.5 rounded-xl text-xs font-bold transition-all flex items-center gap-3 cursor-pointer bg-amber-700 text-white shadow-xs">
                <i class="fa-solid fa-church text-sm w-5 text-center"></i> Relatório de Missas
            </button>
            <button id="btn-m-reunioes" onclick="switchMestreTab('m-reunioes')" class="w-full text-left py-2.5 px-3.5 rounded-xl text-xs font-bold text-stone-300/70 hover:bg-white/5 hover:text-white transition-all flex items-center gap-3 cursor-pointer">
                <i class="fa-solid fa-users-rectangle text-sm w-5 text-center"></i> Relatório de Reuniões
            </button>
            <button id="btn-m-material" onclick="switchMestreTab('m-material')" class="w-full text-left py-2.5 px-3.5 rounded-xl text-xs font-bold text-stone-300/70 hover:bg-white/5 hover:text-white transition-all flex items-center gap-3 cursor-pointer">
                <i class="fa-solid fa-cloud-arrow-up text-sm w-5 text-center"></i> Enviar Materiais
            </button>
            <button id="btn-m-disciplina" onclick="switchMestreTab('m-disciplina')" class="w-full text-left py-2.5 px-3.5 rounded-xl text-xs font-bold text-stone-300/70 hover:bg-white/5 hover:text-white transition-all flex items-center gap-3 cursor-pointer">
                <i class="fa-solid fa-triangle-exclamation text-sm w-5 text-center"></i> Gestão Disciplinar
            </button>
        </nav>

        <div class="p-4 border-t border-white/10 bg-stone-950/50">
            <button id="btn-logout" class="w-full bg-white/10 hover:bg-rose-900/40 hover:text-rose-200 p-2.5 rounded-xl text-xs font-bold flex items-center justify-center gap-2 cursor-pointer transition-all border border-white/5">
                <span>Sair do Sistema</span> <i class="fa-solid fa-arrow-right-from-bracket text-[11px]"></i>
            </button>
        </div>
    </aside>

    <main class="flex-1 p-4 md:p-6 overflow-y-auto max-w-7xl w-full mx-auto space-y-6">

        <section id="sec-m-missas" class="hidden-mestre-tab space-y-4">
            <div class="bg-white p-5 rounded-2xl shadow-xs border border-gray-200">
                <div class="flex justify-between items-center border-b pb-4">
                    <h3 class="text-sm font-black text-gray-800">Frequência em Missas</h3>
                    <input type="month" id="filtro-mes-missas" class="bg-gray-50 border p-2 rounded-lg text-xs font-bold">
                </div>
                <div class="overflow-x-auto mt-4">
                    <table class="w-full text-left text-xs border-collapse">
                        <thead><tr class="bg-gray-50 uppercase text-[10px] text-gray-600 border-b"><th class="p-3">Coroinha</th><th class="p-3 text-center">✓ Conf</th><th class="p-3 text-center">X Faltas</th><th class="p-3 text-center">🔄 Subs</th><th class="p-3 text-center">⚡ Atendeu</th></tr></thead>
                        <tbody id="tabela-frequencia-missas" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="sec-m-reunioes" class="hidden-mestre-tab hidden space-y-4">
            <div class="bg-white p-5 rounded-2xl shadow-xs border border-gray-200">
                <h3 class="text-sm font-black text-gray-800">Frequência em Reuniões</h3>
                <div class="overflow-x-auto mt-4">
                    <table class="w-full text-left text-xs border-collapse">
                        <thead><tr class="bg-gray-50 uppercase text-[10px] text-gray-600 border-b"><th class="p-3">Membro</th><th class="p-3 text-center">✓ Pres</th><th class="p-3 text-center">X Falta</th><th class="p-3 text-center">FJ Just</th><th class="p-3 text-center">Aproveitamento</th></tr></thead>
                        <tbody id="tabela-frequencia-reunioes" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="sec-m-material" class="hidden-mestre-tab hidden grid grid-cols-1 md:grid-cols-3 gap-6">
            <form id="form-mestre-material" class="bg-white p-5 rounded-2xl shadow-xs border h-fit space-y-3">
                <h3 class="text-sm font-black">Adicionar Material</h3>
                <input type="text" id="mat-titulo" required placeholder="Título" class="w-full bg-gray-50 border p-2 rounded-lg text-xs">
                <input type="url" id="mat-url" required placeholder="URL Link" class="w-full bg-gray-50 border p-2 rounded-lg text-xs">
                <button type="submit" class="w-full bg-amber-700 text-white p-2 rounded-lg text-xs font-bold">Publicar</button>
            </form>
            <div id="lista-mestre-materiais" class="md:col-span-2 bg-white p-5 rounded-2xl shadow-xs border"></div>
        </section>

        <section id="sec-m-disciplina" class="hidden-mestre-tab hidden space-y-6">
            <div class="bg-white p-5 rounded-2xl shadow-xs border">
                <h3 class="text-sm font-black text-rose-800 mb-4"><i class="fa-solid fa-triangle-exclamation"></i> Registrar Medida</h3>
                <form id="form-disciplina" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <select id="disc-membro" required class="bg-gray-50 border p-2 rounded-lg text-xs"></select>
                    <select id="disc-tipo" required class="bg-gray-50 border p-2 rounded-lg text-xs"><option value="Advertência">Advertência</option><option value="Suspensão">Suspensão</option></select>
                    <input type="text" id="disc-motivo" placeholder="Motivação da medida..." required class="md:col-span-2 bg-gray-50 border p-2 rounded-lg text-xs">
                    <button type="submit" class="md:col-span-2 bg-rose-700 text-white py-2 rounded-lg text-xs font-bold hover:bg-rose-800 transition-all">Aplicar Medida</button>
                </form>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-xs border"><div id="lista-disciplinar" class="space-y-2"></div></div>
        </section>
    </main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyCwPeLrAtNEO41MZ3yxSuYib2LC0z2dv9U",
        authDomain: "tarcisius-d03d7.firebaseapp.com",
        projectId: "tarcisius-d03d7",
        storageBucket: "tarcisius-d03d7.firebasestorage.app",
        messagingSenderId: "186797936591",
        appId: "1:186797936591:web:72c81c54fb7c1905c1ccba"
    }));

    let cacheUsuarios = [];

    // Lógica Inicialização e Autenticação
    onAuthStateChanged(getAuth(), async (user) => {
        if (!user) return window.location.href = "index.html";
        document.getElementById('tela-loading').classList.add('opacity-0', 'pointer-events-none');
        
        onSnapshot(collection(db, "usuarios"), (snap) => {
            cacheUsuarios = [];
            const select = document.getElementById('disc-membro');
            select.innerHTML = '<option value="">Selecione o Membro</option>';
            snap.forEach(d => {
                if(d.data().funcao !== "Coordenador") {
                    cacheUsuarios.push(d.data().nome);
                    select.innerHTML += `<option value="${d.data().nome}">${d.data().nome}</option>`;
                }
            });
            carregarRelatorioMissas();
            carregarRelatorioReunioes();
        });
        ouvirMateriaisMestre();
        ouvirDisciplinas();
    });

    // Funções de Processamento
    async function carregarRelatorioMissas() {
        const tbody = document.getElementById('tabela-frequencia-missas');
        if(!tbody) return;
        tbody.innerHTML = "";
        const mes = document.getElementById('filtro-mes-missas')?.value || new Date().toISOString().substring(0, 7);
        const snapEscalas = await getDocs(collection(db, "escalas"));
        let relatorio = {};
        cacheUsuarios.forEach(n => relatorio[n] = { pres: 0, falt: 0, sub: 0, atende: 0 });
        snapEscalas.forEach(d => {
            const e = d.data();
            if(e.data?.startsWith(mes)) {
                for(let i=1; i<=6; i++) {
                    const v = e['altar'+i];
                    if(v && relatorio[v.nome]) {
                        if(v.status == "Presente" || v.status == "Confirmado") relatorio[v.nome].pres++;
                        if(v.status == "Falta") relatorio[v.nome].falt++;
                        if(v.status == "Substituido") relatorio[v.nome].sub++;
                    }
                }
                if(e.substitutoNome && relatorio[e.substitutoNome]) relatorio[e.substitutoNome].atende++;
            }
        });
        Object.keys(relatorio).forEach(n => {
            const d = relatorio[n];
            tbody.innerHTML += `<tr><td class="p-3 font-bold">${n}</td><td class="p-3 text-center text-emerald-700">${d.pres}</td><td class="p-3 text-center text-rose-700">${d.falt}</td><td class="p-3 text-center text-blue-700">${d.sub}</td><td class="p-3 text-center text-amber-700">${d.atende}</td></tr>`;
        });
    }

    async function carregarRelatorioReunioes() {
        const snap = await getDocs(collection(db, "reunioes"));
        const tbody = document.getElementById('tabela-frequencia-reunioes');
        if(!tbody) return;
        tbody.innerHTML = "";
        cacheUsuarios.forEach(nome => {
            let p=0, f=0, j=0, tot=0;
            snap.forEach(d => {
                const pres = d.data().presencas || {};
                if(pres[nome]) {
                    tot++;
                    if(pres[nome] == "presente") p++;
                    if(pres[nome] == "falta") f++;
                    if(pres[nome] == "justificada") j++;
                }
            });
            const apr = tot > 0 ? Math.round(((p+j)/tot)*100) : 100;
            tbody.innerHTML += `<tr><td class="p-3 font-bold">${nome}</td><td class="p-3 text-center text-emerald-600">${p}</td><td class="p-3 text-center text-rose-600">${f}</td><td class="p-3 text-center text-blue-600">${j}</td><td class="p-3 text-center"><span class="${apr < 75 ? 'bg-rose-100 text-rose-800' : 'bg-emerald-100 text-emerald-800'} px-2 py-0.5 rounded font-black">${apr}%</span></td></tr>`;
        });
    }

    // Disciplina e Materiais
    function ouvirDisciplinas() {
        onSnapshot(collection(db, "disciplina"), (snap) => {
            const div = document.getElementById('lista-disciplinar');
            div.innerHTML = "";
            snap.forEach(d => {
                const i = d.data();
                div.innerHTML += `<div class="p-2 border-b text-xs flex justify-between"><div><span class="font-bold text-rose-700">${i.tipo}</span> - ${i.membro}: ${i.motivo}</div><div class="text-gray-400">${i.data}</div></div>`;
            });
        });
    }

    document.getElementById('form-disciplina').addEventListener('submit', async (e) => {
        e.preventDefault();
        await setDoc(doc(db, "disciplina", "disc_" + Date.now()), {
            membro: document.getElementById('disc-membro').value,
            tipo: document.getElementById('disc-tipo').value,
            motivo: document.getElementById('disc-motivo').value,
            data: new Date().toLocaleDateString('pt-BR')
        });
        alert("Ação registrada.");
        e.target.reset();
    });

    function ouvirMateriaisMestre() {
        onSnapshot(collection(db, "formacao"), (snap) => {
            const div = document.getElementById('lista-mestre-materiais');
            div.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                div.innerHTML += `<div class="flex justify-between py-2 border-b text-xs"><div><strong>${m.titulo}</strong><br><a href="${m.url}" target="_blank" class="text-amber-700">${m.url}</a></div><button onclick="removerMaterial('${d.id}')" class="text-rose-600">Excluir</button></div>`;
            });
        });
    }

    window.removerMaterial = async (id) => await deleteDoc(doc(db, "formacao", id));
    window.switchMestreTab = (tabID) => {
        document.querySelectorAll('.hidden-mestre-tab').forEach(el => el.classList.add('hidden'));
        document.getElementById('sec-' + tabID).classList.remove('hidden');
    };
    document.getElementById('btn-logout').addEventListener('click', () => signOut(getAuth()).then(() => location.href = "index.html"));
</script>
</body>
</html>
