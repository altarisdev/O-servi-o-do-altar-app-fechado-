<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altaris - Sistema de Escala</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 text-white">

    <!-- Tela de Login Padrão -->
    <div id="tela-login" class="flex items-center justify-center h-screen">
        <div class="w-full max-w-md p-8 bg-gray-800 rounded-lg shadow-md">
            <h2 class="text-2xl font-bold text-center mb-6">Login de Membros</h2>
            
            <form id="form-login" class="space-y-4">
                <div>
                    <label for="login-email" class="block text-sm font-medium mb-1">E-mail:</label>
                    <input type="email" id="login-email" required 
                           class="w-full p-2 rounded bg-gray-700 border border-gray-600 text-white focus:outline-none">
                </div>
                
                <div>
                    <label for="login-senha" class="block text-sm font-medium mb-1">Senha:</label>
                    <input type="password" id="login-senha" required 
                           class="w-full p-2 rounded bg-gray-700 border border-gray-600 text-white focus:outline-none">
                </div>

                <!-- Elementos de erro alinhados ao JS principal -->
                <div id="erro-login" class="hidden text-red-500 text-sm font-semibold mt-2 text-center">
                    <span id="erro-login-texto">E-mail ou senha incorretos.</span>
                </div>

                <button type="submit" 
                        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded transition duration-200">
                    Entrar
                </button>
            </form>
        </div>
    </div>

    <!-- Container do Painel Principal (Inicia oculto/vazio até o login ser validado) -->
    <div id="painel-principal" class="hidden container mx-auto p-4">
        <!-- Sua interface de escalas, perfil do irmão logado, etc. vai aqui -->
        <h1 class="text-3xl font-bold">Bem-vindo ao Altaris</h1>
        <p class="text-gray-400 mt-2">Você está logado no sistema.</p>
        <button id="btn-logout" class="mt-4 bg-red-600 px-4 py-2 rounded">Sair</button>
    </div>

    <!-- Elemento de Loading Global do Sistema -->
    <div id="loading" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50">
        <div class="text-xl font-bold">Carregando dados...</div>
    </div>

    <!-- Scripts de Inicialização do Firebase e Lógica de Negócio -->
    <script type="module">
        // Importações do Firebase e a lógica do app.js / script.js vão aqui ou no seu arquivo compilado externo.
        // Certifique-se de que as funções originais (showLoading, hideLoading, inicializarInterfaceUsuario) estejam declaradas no escopo do seu script principal.
    </script>
</body>
</html>
