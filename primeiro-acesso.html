<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altaris - Primeiro Acesso</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div id="tela-loading" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center transition-opacity duration-300 pointer-events-none opacity-0">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-amber-700 mb-4"></div>
        <p class="text-xs font-semibold text-gray-500 tracking-wider uppercase">Criando sua credencial de altar...</p>
    </div>

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-amber-700 text-white rounded-2xl flex items-center justify-center text-2xl mx-auto shadow-md mb-3">
                <i class="fa-solid fa-user-plus"></i>
            </div>
            <h1 class="text-2xl font-black text-gray-800 tracking-tight">Primeiro Acesso</h1>
            <p class="text-xs text-gray-500 font-medium">Cadastre seu perfil no sistema Altaris</p>
        </div>

        <form id="form-cadastro" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Código do Coordenador</label>
                <div class="relative">
                    <i class="fa-solid fa-key absolute left-3 top-3.5 text-gray-400 text-xs"></i>
                    <input type="text" id="cad-codigo" required placeholder="Token da coordenação" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 pl-9 pr-4 text-sm focus:outline-none focus:border-amber-600 transition-all font-medium uppercase">
                </div>
            </div>

            <hr class="border-gray-100 my-2">

            <!-- NOVO: SELEÇÃO DE PERFIL -->
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Tipo de Acesso</label>
                <select id="cad-tipo" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-4 text-sm focus:outline-none focus:border-amber-600 transition-all font-medium" onchange="toggleCampoVinculo()">
                    <option value="Coroinha">Coroinha / Acólito</option>
                    <option value="Pai">Responsável (Pais)</option>
                </select>
            </div>

            <!-- NOVO: CAMPO DE VÍNCULO -->
            <div id="container-vinculo" class="hidden">
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Nome do Coroinha (Filho)</label>
                <input type="text" id="cad-vinculo" placeholder="Nome completo do filho" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-4 text-sm focus:outline-none focus:border-amber-600 transition-all font-medium">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Seu Nome Completo</label>
                <input type="text" id="cad-nome" required placeholder="Ex: João Silva" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-4 text-sm focus:outline-none focus:border-amber-600 transition-all font-medium">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">E-mail</label>
                <input type="email" id="cad-email" required placeholder="seuemail@exemplo.com" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-4 text-sm focus:outline-none focus:border-amber-600 transition-all font-medium">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Senha</label>
                <input type="password" id="cad-senha" required minlength="6" placeholder="Mínimo 6 caracteres" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-4 text-sm focus:outline-none focus:border-amber-600 transition-all font-medium">
            </div>

            <div id="msg-erro" class="hidden text-xs bg-rose-50 border border-rose-200 text-rose-700 p-3 rounded-lg font-semibold flex items-center gap-2">
                <i class="fa-solid fa-triangle-exclamation"></i> <span id="msg-erro-texto">Erro.</span>
            </div>
            <div id="msg-sucesso" class="hidden text-xs bg-emerald-50 border border-emerald-200 text-emerald-700 p-3 rounded-lg font-semibold flex items-center gap-2">
                <i class="fa-solid fa-circle-check"></i> <span>Cadastro realizado! Redirecionando...</span>
            </div>

            <button type="submit" class="w-full bg-amber-700 hover:bg-amber-800 text-white font-bold py-3 rounded-xl shadow-md transition-all cursor-pointer text-sm tracking-wide">
                Finalizar Cadastro
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="index.html" class="text-gray-500 hover:text-amber-700 text-xs font-bold transition-colors">Voltar para Login</a>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const CODIGO_VALIDACAO_COORDEANDOR = "ALTAR2026";
    const firebaseConfig = {
        apiKey: "AIzaSyCwPeLrAtNEO41MZ3yxSuYib2LC0z2dv9U",
        authDomain: "tarcisius-d03d7.firebaseapp.com",
        projectId: "tarcisius-d03d7",
        storageBucket: "tarcisius-d03d7.firebasestorage.app",
        messagingSenderId: "186797936591",
        appId: "1:186797936591:web:72c81c54fb7c1905c1ccba"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const authSecundario = getAuth(initializeApp(firebaseConfig, "SecondaryAuthInstance"));

    // Exibir/Ocultar campo de vínculo
    window.toggleCampoVinculo = () => {
        const tipo = document.getElementById('cad-tipo').value;
        document.getElementById('container-vinculo').classList.toggle('hidden', tipo !== 'Pai');
    };

    const formCadastro = document.getElementById('form-cadastro');
    formCadastro.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const codigo = document.getElementById('cad-codigo').value.trim().toUpperCase();
        if (codigo !== CODIGO_VALIDACAO_COORDEANDOR) {
            document.getElementById('msg-erro-texto').innerText = "Código do Coordenador inválido!";
            document.getElementById('msg-erro').classList.remove('hidden');
            return;
        }

        document.getElementById('tela-loading').classList.replace('opacity-0', 'opacity-100');
        
        try {
            const email = document.getElementById('cad-email').value.trim().toLowerCase();
            const senha = document.getElementById('cad-senha').value.trim();
            const tipo = document.getElementById('cad-tipo').value;
            const nome = document.getElementById('cad-nome').value.trim();
            
            const cred = await createUserWithEmailAndPassword(authSecundario, email, senha);
            
            const dadosUsuario = {
                uid: cred.user.uid,
                nome: nome,
                email: email,
                funcao: tipo
            };

            if (tipo === "Pai") {
                dadosUsuario.coroinhaVinculado = document.getElementById('cad-vinculo').value.trim();
            }

            await setDoc(doc(db, "usuarios", cred.user.uid), dadosUsuario);
            await signOut(authSecundario);

            document.getElementById('msg-sucesso').classList.remove('hidden');
            setTimeout(() => { window.location.href = "index.html"; }, 2000);
        } catch (err) {
            document.getElementById('tela-loading').classList.replace('opacity-100', 'opacity-0');
            document.getElementById('msg-erro-texto').innerText = "Erro: " + err.message;
            document.getElementById('msg-erro').classList.remove('hidden');
        }
    });
</script>
</body>
</html>
