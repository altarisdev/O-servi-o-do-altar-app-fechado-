<body class="bg-sacro-dourado font-sans min-h-screen flex flex-col transition-colors duration-500">

    <div id="tela-loading" class="fixed inset-0 bg-white/80 dark:bg-zinc-950/80 backdrop-blur-md z-50 flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="relative flex items-center justify-center mb-4">
            <div class="animate-spin rounded-full h-12 w-12 border-2 border-transparent border-t-red-600 border-b-amber-500"></div>
            <i class="fa-solid fa-cross text-red-600 absolute text-xs"></i>
        </div>
        <p class="text-[10px] font-black text-gray-400 dark:text-zinc-500 tracking-widest uppercase animate-pulse">Sincronizando Presbitério...</p>
    </div>

    <header class="bg-red-800 dark:bg-zinc-900 text-white px-4 py-4 shadow-md sticky top-0 z-40 border-b border-red-900/40 dark:border-zinc-800/80 transition-colors">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center border border-white/10">
                    <i class="fa-solid fa-cross text-amber-400 text-lg"></i>
                </div>
                <div>
                    <h1 class="text-sm font-black tracking-wide uppercase">Altaris</h1>
                    <p class="text-[10px] text-red-200/70 dark:text-zinc-400 font-medium tracking-wider">Painel do Acólito</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <button id="btn-dark-mode" class="relative w-12 h-7 bg-red-950/40 dark:bg-zinc-800 rounded-full p-1 cursor-pointer transition-all duration-500 border border-white/5 dark:border-zinc-700/30">
                    <div id="dark-mode-thumb" class="w-5 h-5 bg-white dark:bg-zinc-900 rounded-full flex items-center justify-center shadow-md transform transition-all duration-500 ease-out translate-x-0">
                        <i class="fa-solid fa-sun text-amber-500 text-[10px] absolute transition-all duration-500 scale-100 rotate-0 dark:scale-0 dark:rotate-180"></i>
                        <i class="fa-solid fa-moon text-red-500 text-[10px] absolute transition-all duration-500 scale-0 -rotate-180 dark:scale-100 dark:rotate-0"></i>
                    </div>
                </button>

                <div class="text-right hidden sm:block">
                    <p id="user-nome" class="text-xs font-bold text-white">Carregando...</p>
                    <p id="user-funcao" class="text-[10px] text-red-200/80 dark:text-zinc-400 font-medium"></p>
                </div>
                <button id="btn-logout" class="bg-red-950/40 dark:bg-zinc-800/50 hover:bg-red-900 dark:hover:bg-zinc-800 p-2.5 rounded-xl transition-all text-white/90 cursor-pointer border border-white/5 dark:border-zinc-700/20 text-xs flex items-center gap-2">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> <span class="hidden sm:inline font-bold">Sair</span>
                </button>
            </div>
        </div>
    </header>

    <nav class="bg-white dark:bg-zinc-900 border-b border-slate-200/60 dark:border-zinc-800 shadow-xs sticky top-[73px] z-30 transition-colors">
        <div class="max-w-6xl mx-auto flex justify-around md:justify-start md:gap-8 px-2">
            <button onclick="switchTab('escala')" id="tab-escala" class="active-tab flex-1 md:flex-none py-3.5 px-4 text-center text-xs flex flex-col md:flex-row items-center gap-1.5 cursor-pointer text-slate-500 dark:text-zinc-400">
                <i class="fa-solid fa-calendar-days text-sm"></i> <span>Minha Escala</span>
            </button>
            <button onclick="switchTab('avisos')" id="tab-avisos" class="flex-1 md:flex-none py-3.5 px-4 text-center text-xs flex flex-col md:flex-row items-center gap-1.5 cursor-pointer text-slate-500 dark:text-zinc-400">
                <i class="fa-solid fa-bullhorn text-sm"></i> <span>Avisos</span>
            </button>
            <button onclick="switchTab('conteudos')" id="tab-conteudos" class="flex-1 md:flex-none py-3.5 px-4 text-center text-xs flex flex-col md:flex-row items-center gap-1.5 cursor-pointer text-slate-500 dark:text-zinc-400">
                <i class="fa-solid fa-book-open text-sm"></i> <span>Formação</span>
            </button>
            <button onclick="switchTab('liturgia')" id="tab-liturgia" class="flex-1 md:flex-none py-3.5 px-4 text-center text-xs flex flex-col md:flex-row items-center gap-1.5 cursor-pointer text-slate-500 dark:text-zinc-400">
                <i class="fa-solid fa-scroll text-sm"></i> <span>Liturgia Diária</span>
            </button>
        </div>
    </nav>

    <main class="flex-1 max-w-6xl w-full mx-auto p-4 md:p-6 z-10 relative">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-start">
            
            <div id="conteudo-escala" class="space-y-6 block md:col-span-2">
                <div class="bg-white dark:bg-zinc-900 rounded-3xl shadow-[0_20px_45px_rgba(0,0,0,0.04)] dark:shadow-[0_20px_45px_rgba(0,0,0,0.3)] border border-slate-100 dark:border-zinc-800/80 overflow-hidden relative transition-all">
                    <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-red-700 via-amber-500 to-red-600"></div>
                    
                    <div class="p-6 border-b border-slate-100 dark:border-zinc-800/60 flex items-center justify-between">
                        <div class="flex items-center gap-2.5">
                            <i class="fa-solid fa-calendar-check text-red-600 dark:text-red-500 text-lg"></i>
                            <h2 class="text-base font-black text-slate-800 dark:text-zinc-100 tracking-tight">Próxima Escala Designada</h2>
                        </div>
                        <input type="date" id="filtro-data-escala" class="bg-slate-50 dark:bg-zinc-800/50 border border-slate-200 dark:border-zinc-700/50 rounded-xl px-3 py-1.5 text-xs font-semibold text-slate-700 dark:text-zinc-200 outline-none focus:border-red-600 transition-all shadow-xs">
                    </div>

                    <div class="p-6">
                        <div id="container-escala-infos" class="bg-slate-50/70 dark:bg-zinc-800/30 rounded-2xl p-5 border border-slate-100 dark:border-zinc-800/50 space-y-4">
                            <div class="flex flex-wrap items-center justify-between gap-3 border-b border-slate-200/50 dark:border-zinc-700/40 pb-3">
                                <div>
                                    <p id="escala-missa" class="text-sm font-black text-slate-800 dark:text-zinc-100">Selecione uma data ou aguarde o carregamento...</p>
                                    <p id="escala-data-formatada" class="text-xs text-slate-400 dark:text-zinc-400 font-medium mt-0.5"></p>
                                </div>
                                <span id="escala-status-badge" class="px-2.5 py-1 rounded-lg text-[10px] font-bold tracking-wider uppercase bg-amber-50 text-amber-700 dark:bg-amber-950/30 dark:text-amber-400 border border-amber-100 dark:border-amber-900/30">Pendente</span>
                            </div>

                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-1" id="grid-funcoes-escala">
                                </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="conteudo-avisos" class="space-y-4 hidden md:block">
                <div class="bg-white dark:bg-zinc-900 rounded-3xl shadow-[0_20px_45px_rgba(0,0,0,0.04)] dark:shadow-[0_20px_45px_rgba(0,0,0,0.3)] border border-slate-100 dark:border-zinc-800/80 overflow-hidden relative transition-all">
                    <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-amber-500 to-red-600"></div>
                    
                    <div class="p-5 border-b border-slate-100 dark:border-zinc-800/60 flex items-center gap-2.5">
                        <i class="fa-solid fa-bullhorn text-amber-600 dark:text-amber-500 text-base"></i>
                        <h2 class="text-sm font-black text-slate-800 dark:text-zinc-100 tracking-tight">Mural de Avisos</h2>
                    </div>
                    <div class="p-5 space-y-4" id="container-avisos">
                        </div>
                </div>
            </div>

            <div id="conteudo-conteudos" class="space-y-4 hidden md:block md:col-span-2">
                <div class="bg-white dark:bg-zinc-900 rounded-3xl shadow-[0_20px_45px_rgba(0,0,0,0.04)] dark:shadow-[0_20px_45px_rgba(0,0,0,0.3)] border border-slate-100 dark:border-zinc-800/80 overflow-hidden relative transition-all">
                    <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-red-700 to-amber-500"></div>
                    
                    <div class="p-5 border-b border-slate-100 dark:border-zinc-800/60 flex items-center gap-2.5">
                        <i class="fa-solid fa-book-open text-red-600 dark:text-red-500 text-base"></i>
                        <h2 class="text-sm font-black text-slate-800 dark:text-zinc-100 tracking-tight">Materiais de Formação Litúrgica</h2>
                    </div>
                    <div class="p-5 grid grid-cols-1 sm:grid-cols-2 gap-4" id="container-materiais">
                        </div>
                </div>
            </div>

            <div id="conteudo-liturgia" class="space-y-4 hidden md:block">
                <div class="bg-white dark:bg-zinc-900 rounded-3xl shadow-[0_20px_45px_rgba(0,0,0,0.04)] dark:shadow-[0_20px_45px_rgba(0,0,0,0.3)] border border-slate-100 dark:border-zinc-800/80 overflow-hidden relative transition-all">
                    <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-amber-600 via-red-600 to-amber-500"></div>
                    
                    <div class="p-5 border-b border-slate-100 dark:border-zinc-800/60 flex items-center gap-2.5">
                        <i class="fa-solid fa-scroll text-amber-600 dark:text-amber-500 text-base"></i>
                        <h2 class="text-sm font-black text-slate-800 dark:text-zinc-100 tracking-tight">Liturgia de Hoje</h2>
                    </div>
                    <div class="p-5 space-y-3" id="container-liturgia-dados">
                        <div class="animate-pulse space-y-2">
                            <div class="h-3 bg-slate-200 dark:bg-zinc-800 rounded-sm w-3/4"></div>
                            <div class="h-3 bg-slate-200 dark:bg-zinc-800 rounded-sm w-1/2"></div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, getDocs, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCwPeLrAtNEO41MZ3yxSuYib2LC0z2dv9U",
        authDomain: "tarcisius-d03d7.firebaseapp.com",
        projectId: "tarcisius-d03d7",
        storageBucket: "tarcisius-d03d7.firebasestorage.app",
        messagingSenderId: "186797936591",
        appId: "1:186797936591:web:72c81c54fb7c1905c1ccba"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const telaLoading = document.getElementById('tela-loading');
    const userNome = document.getElementById('user-nome');
    const userFuncao = document.getElementById('user-funcao');
    const btnLogout = document.getElementById('btn-logout');
    const filtroDataEscala = document.getElementById('filtro-data-escala');
    const btnDarkMode = document.getElementById('btn-dark-mode');
    const darkModeThumb = document.getElementById('dark-mode-thumb');

    let dadosUsuarioAtual = null;

    // Sincronização e animação do botão Dark Mode
    function sincronizarVisualBotao(isDark) {
        if (isDark) {
            darkModeThumb.classList.remove('translate-x-0');
            darkModeThumb.classList.add('translate-x-5');
        } else {
            darkModeThumb.classList.remove('translate-x-5');
            darkModeThumb.classList.add('translate-x-0');
        }
    }

    const temaSalvo = localStorage.getItem('theme');
    const prefereSistemaEscuro = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (temaSalvo === 'dark' || (!temaSalvo && prefereSistemaEscuro)) {
        document.documentElement.classList.add('dark');
        sincronizarVisualBotao(true);
    } else {
        document.documentElement.classList.remove('dark');
        sincronizarVisualBotao(false);
    }

    btnDarkMode?.addEventListener('click', () => {
        const modificadoParaDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', modificadoParaDark ? 'dark' : 'light');
        sincronizarVisualBotao(modificadoParaDark);
    });

    function showLoading() { if(telaLoading) { telaLoading.classList.remove('pointer-events-none', 'opacity-0'); telaLoading.classList.add('opacity-100'); } }
    function hideLoading() { if(telaLoading) { telaLoading.classList.remove('opacity-100'); telaLoading.classList.add('opacity-0', 'pointer-events-none'); } }

    // Gerenciador de Abas Mobile / Responsivo
    window.switchTab = function(tabName) {
        const sections = ['escala', 'avisos', 'conteudos', 'liturgia'];
        sections.forEach(sec => {
            const el = document.getElementById(`conteudo-${sec}`);
            const tab = document.getElementById(`tab-${sec}`);
            if(el) {
                if(sec === tabName) {
                    el.className = `space-y-6 block ${sec === 'escala' || sec === 'conteudos' ? 'md:col-span-2' : ''}`;
                } else {
                    el.className = 'space-y-6 hidden md:block';
                }
            }
            if(tab) {
                if(sec === tabName) tab.classList.add('active-tab');
                else tab.classList.remove('active-tab');
            }
        });
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const docSnap = await getDoc(doc(db, "usuarios", user.uid));
            if (docSnap.exists()) {
                dadosUsuarioAtual = docSnap.data();
                userNome.innerText = dadosUsuarioAtual.nome;
                userFuncao.innerText = dadosUsuarioAtual.funcao || "Acólito";
                
                // Define data de hoje no input padrão
                const hojeStr = new Date().toISOString().split('T')[0];
                filtroDataEscala.value = hojeStr;

                await carregarMinhaEscala(hojeStr);
                await carregarAvisos();
                await carregarMateriais();
                await buscarLiturgiaDiaria();
            } else {
                window.location.href = "index.html";
            }
        } else {
            const devSession = sessionStorage.getItem("dev_user");
            if (devSession) {
                dadosUsuarioAtual = JSON.parse(devSession);
                userNome.innerText = dadosUsuarioAtual.nome;
                userFuncao.innerText = dadosUsuarioAtual.funcao;
                const hojeStr = new Date().toISOString().split('T')[0];
                filtroDataEscala.value = hojeStr;
                hideLoading();
            } else {
                window.location.href = "index.html";
            }
        }
        hideLoading();
    });

    filtroDataEscala?.addEventListener('change', async (e) => {
        showLoading();
        await carregarMinhaEscala(e.target.value);
        hideLoading();
    });

    async function carregarMinhaEscala(dataAlvo) {
        const containerMissa = document.getElementById('escala-missa');
        const containerData = document.getElementById('escala-data-formatada');
        const containerGrid = document.getElementById('grid-funcoes-escala');
        
        if(!containerGrid) return;
        containerGrid.innerHTML = "";

        try {
            const docRef = doc(db, "escalas", dataAlvo);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const dados = docSnap.exists() ? docSnap.data() : {};
                containerMissa.innerText = dados.nomeMissa || "Celebração Regular";
                
                const partes = dataAlvo.split('-');
                containerData.innerText = `${partes[2]}/${partes[1]}/${partes[0]} às ${dados.horario || "00:00"}`;

                const listaFuncoes = [
                    { chave: 'turiferario', label: 'Turiferário', icone: 'fa-smudge' },
                    { chave: 'naveteiro', label: 'Naveteiro', icone: 'fa-box-tissue' },
                    { chave: 'cruciferario', label: 'Cruciferário', icone: 'fa-cross' },
                    { chave: 'ceriferario1', label: 'Ceriferário 1', icone: 'fa-candle-holder' },
                    { chave: 'ceriferario2', label: 'Ceriferário 2', icone: 'fa-candle-holder' },
                    { chave: 'mestreCerimonias', label: 'Mestre de Cerimónias', icone: 'fa-user-tie' },
                    { chave: 'livro', label: 'Portador do Livro', icone: 'fa-book' },
                    { chave: 'credencia', label: 'Apoio da Credência', icone: 'fa-wine-glass' }
                ];

                listaFuncoes.forEach(f => {
                    const obj = dados[f.chave];
                    if (obj && obj.nome) {
                        const isEu = obj.nome.toLowerCase() === dadosUsuarioAtual?.nome?.toLowerCase();
                        const cardFuncao = document.createElement('div');
                        cardFuncao.className = `p-3.5 rounded-xl border flex items-center justify-between transition-all ${
                            isEu 
                            ? 'bg-red-50/70 dark:bg-red-950/20 border-red-200 dark:border-red-900/40 ring-2 ring-red-600/10' 
                            : 'bg-white dark:bg-zinc-900 border-slate-100 dark:border-zinc-800/80'
                        }`;

                        cardFuncao.innerHTML = `
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-lg flex items-center justify-center text-xs ${isEu ? 'bg-red-600 text-white' : 'bg-slate-100 dark:bg-zinc-800 text-slate-500 dark:text-zinc-400'}">
                                    <i class="fa-solid ${f.icone || 'fa-user'}"></i>
                                </div>
                                <div>
                                    <p class="text-[10px] font-bold uppercase tracking-wider text-slate-400 dark:text-zinc-500">${f.label}</p>
                                    <p class="text-xs font-bold ${isEu ? 'text-red-700 dark:text-red-400' : 'text-slate-700 dark:text-zinc-200'}">${obj.nome}</p>
                                </div>
                            </div>
                            ${isEu ? '<span class="text-[9px] font-black uppercase tracking-widest bg-red-600 text-white px-2 py-0.5 rounded-md shadow-xs animate-pulse">Sua Função</span>' : ''}
                        `;
                        containerGrid.appendChild(cardFuncao);
                    }
                });

                if(containerGrid.children.length === 0) {
                    containerGrid.innerHTML = `<p class="text-xs font-medium text-slate-400 dark:text-zinc-500 col-span-2 text-center py-4">Nenhum acólito escalado para as funções principais nesta data.</p>`;
                }
            } else {
                containerMissa.innerText = "Sem escala cadastrada";
                containerData.innerText = "Nenhuma escala foi publicada para a data selecionada.";
                containerGrid.innerHTML = `<p class="text-xs font-medium text-slate-400 dark:text-zinc-500 col-span-2 text-center py-4">Presbitério livre ou sem atividades registradas.</p>`;
            }
        } catch(e) {
            containerMissa.innerText = "Erro ao buscar dados";
        }
    }

    async function carregarAvisos() {
        const container = document.getElementById('container-avisos');
        if(!container) return;
        container.innerHTML = "";
        try {
            const q = query(collection(db, "avisos"), orderBy("dataCriacao", "desc"), limit(4));
            const querySnap = await getDocs(q);
            querySnap.forEach(doc => {
                const item = doc.data();
                const div = document.createElement('div');
                div.className = "p-4 rounded-xl bg-slate-50/70 dark:bg-zinc-800/30 border border-slate-100 dark:border-zinc-800/60 hover:border-amber-500/30 transition-all";
                div.innerHTML = `
                    <div class="flex items-center justify-between mb-1.5">
                        <span class="text-[9px] font-extrabold uppercase tracking-widest px-2 py-0.5 rounded-md bg-amber-50 text-amber-700 dark:bg-amber-950/40 dark:text-amber-400 border border-amber-100/60 dark:border-amber-900/20">${item.categoria || 'Geral'}</span>
                        <span class="text-[10px] font-medium text-slate-400 dark:text-zinc-500">${item.dataExibicao || ''}</span>
                    </div>
                    <p class="text-xs font-bold text-slate-700 dark:text-zinc-200 mb-0.5">${item.titulo || ''}</p>
                    <p class="text-xs text-slate-500 dark:text-zinc-400 leading-relaxed font-medium">${item.conteudo || ''}</p>
                `;
                container.appendChild(div);
            });
            if(container.children.length === 0) {
                container.innerHTML = `<p class="text-xs font-medium text-slate-400 dark:text-zinc-500 text-center py-4">Nenhum aviso importante no mural.</p>`;
            }
        } catch(err) {
            container.innerHTML = `<p class="text-xs text-slate-400 text-center">Mural indisponível temporariamente.</p>`;
        }
    }

    async function carregarMateriais() {
        const container = document.getElementById('container-materiais');
        if(!container) return;
        container.innerHTML = "";
        try {
            const querySnap = await getDocs(collection(db, "materiais"));
            querySnap.forEach(doc => {
                const item = doc.data();
                const div = document.createElement('div');
                div.className = "p-4 rounded-xl bg-slate-50/70 dark:bg-zinc-800/30 border border-slate-100 dark:border-zinc-800/60 flex items-start gap-3.5 hover:shadow-xs transition-all";
                div.innerHTML = `
                    <div class="w-9 h-9 rounded-xl bg-red-600/10 dark:bg-red-500/10 text-red-600 dark:text-red-400 flex items-center justify-center shrink-0 text-sm">
                        <i class="fa-solid ${item.tipo === 'Vídeo' ? 'fa-video' : 'fa-file-pdf'}"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs font-black text-slate-700 dark:text-zinc-200 truncate">${item.titulo || 'Formação Litúrgica'}</p>
                        <p class="text-[11px] text-slate-400 dark:text-zinc-400 truncate font-medium mt-0.5">${item.descricao || 'Sem descrição cadastrada'}</p>
                        <a href="${item.url || '#'}" target="_blank" class="text-[10px] font-bold text-red-600 dark:text-red-400 hover:underline inline-flex items-center gap-1 mt-2 uppercase tracking-wider">
                            Acessar Conteúdo <i class="fa-solid fa-arrow-up-right-from-square text-[8px]"></i>
                        </a>
                    </div>
                `;
                container.appendChild(div);
            });
            if(container.children.length === 0) {
                container.innerHTML = `<p class="text-xs font-medium text-slate-400 dark:text-zinc-500 text-center col-span-2 py-4">Nenhum material de formação anexado.</p>`;
            }
        } catch(err) {
            container.innerHTML = `<p class="text-xs text-slate-400 text-center col-span-2">Falha ao carregar biblioteca.</p>`;
        }
    }

    async function buscarLiturgiaDiaria() {
        const container = document.getElementById('container-liturgia-dados');
        if(!container) return;
        try {
            const res = await fetch('https://liturgia.up.railway.app/');
            const data = await res.json();
            container.innerHTML = `
                <div class="space-y-2">
                    <p class="text-[10px] font-black uppercase tracking-wider text-amber-600 dark:text-amber-500">${data.cor || 'Tempo Comum'}</p>
                    <p class="text-xs font-bold text-slate-700 dark:text-zinc-200 leading-tight">${data.liturgia || 'Celebração do Dia'}</p>
                    <div class="pt-2 border-t border-slate-100 dark:border-zinc-800/60 space-y-1.5">
                        <p class="text-[11px] font-medium text-slate-500 dark:text-zinc-400"><strong>1ª Leitura:</strong> ${data.primeiraLeitura || 'Consultar Missal'}</p>
                        <p class="text-[11px] font-medium text-slate-500 dark:text-zinc-400"><strong>Evangelho:</strong> ${data.evangelho || 'Consultar Missal'}</p>
                    </div>
                </div>
            `;
        } catch {
            container.innerHTML = `<p class="text-xs text-slate-400 font-medium py-2">Sincronização offline com o Missal Romano.</p>`;
        }
    }

    btnLogout?.addEventListener('click', async () => {
        showLoading();
        sessionStorage.clear();
        await signOut(auth);
        window.location.href = "index.html";
    });
</script>
</body>
</html>
